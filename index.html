
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세상을 잇는 넥스투 | NexTo Labs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #FFFFFF;
      --bg: #000000;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
    }
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif;
      background-color: var(--bg);
      color: var(--accent);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .editorial-title {
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.9;
      text-transform: uppercase;
    }
    .neo-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .neo-card:hover {
      border-color: rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-5px);
    }
    .brutal-border {
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .animate-fade-in {
      animation: fadeIn 1s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .neo-gradient-text {
      background: linear-gradient(180deg, #FFFFFF 0%, rgba(255, 255, 255, 0.4) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-image-mask {
      mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #333; }
    ::-webkit-scrollbar-thumb:hover { background: #551; }
    
    .glow {
      box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
<body class="selection:bg-white selection:text-black">
   <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
